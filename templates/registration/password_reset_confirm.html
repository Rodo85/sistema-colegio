<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nueva contraseña</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-5">
    <div class="mx-auto bg-white border rounded p-4" style="max-width:520px;">
      <h4 class="mb-3">Definir nueva contraseña</h4>
      {% if validlink %}
        <form method="post">
          {% csrf_token %}
          {{ form.as_p }}
          <button type="submit" class="btn btn-primary">Guardar contraseña</button>
        </form>
      {% else %}
        <p>Este enlace ya no es válido. Solicita una nueva recuperación.</p>
        <a class="btn btn-primary" href="{% url 'password_reset' %}">Solicitar de nuevo</a>
      {% endif %}
    </div>
  </div>
</body>
</html>
